<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - SevenSpa</title>
<style>
body{font-family:Arial;background:#111;color:white;padding:20px;}
.card{background:#222;padding:10px;margin:10px;border-left:3px solid gold;}
button{padding:10px;background:gold;border:none;cursor:pointer;}
</style>
</head>

<body>

<h1>ADMIN PANEL SEVEN SPA</h1>

<button onclick="loadBookings()">Load Bookings</button>
<button onclick="loadVIP()">Load VIP</button>

<h2>BOOKINGS</h2>
<div id="bookings"></div>

<h2>VIP MEMBERS</h2>
<div id="vip"></div>

<script>
const API = "http://localhost:3000";

/* =========================
   LOAD BOOKINGS
========================= */
async function loadBookings(){
const res = await fetch(API + "/bookings");
const data = await res.json();

document.getElementById("bookings").innerHTML =
data.map(b => `
<div class="card">
<b>${b.name}</b><br>
${b.service}<br>
${b.date} - ${b.time}
</div>
`).join("");
}

/* =========================
   LOAD VIP
========================= */
async function loadVIP(){
const res = await fetch(API + "/vip");
const data = await res.json();

document.getElementById("vip").innerHTML =
data.map(v => `
<div class="card">
<b>${v.name}</b><br>
${v.phone}
</div>
`).join("");
}
</script>

</body>
</html>
